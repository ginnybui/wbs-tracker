<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS Management Workspace</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
        }
        .container-title {
            color: #1e293b;
            margin-bottom: 16px;
            font-size: 22px;
            font-weight: 600;
        }
        .wbs-tracker-mask {
            position: relative;
            width: 100%;
            height: 85vh;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .wbs-tracker-mask iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 56px);
            border: none;
        }
    </style>
</head>
<body>

    <div class="container-title">📊 Production WBS Tracker Workspace</div>
    
    <div class="wbs-tracker-mask">
        <iframe src="https://wbs-tracker-uat.streamlit.app/?embed=true"></iframe>
    </div>

</body>
</html>
