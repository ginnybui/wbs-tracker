<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS Management Workspace</title>
    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: #ffffff !important;
            /* Crucial: This cuts off the extra 50px where the Streamlit footer is hidden */
            overflow: hidden !important; 
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            /* Clever trick: Push the footer 50px below the visible screen area */
            height: calc(100% + 50px) !important; 
            border: none !important;
        }
    </style>
</head>
<body>

    <iframe src="https://wbs-tracker-uat.streamlit.app/?embed=true"></iframe>

</body>
</html>
