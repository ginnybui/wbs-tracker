<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS Management Workspace</title>
    <style>
        /* Force the browser to remove all outer borders and margins */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: #ffffff !important;
            overflow: hidden;
        }

        /* Pure direct link presentation with absolutely no clipping masks */
        iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }
    </style>
</head>
<body>

    <iframe src="https://wbs-tracker-uat.streamlit.app/?embed=true"></iframe>

</body>
</html>
