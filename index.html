<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS Management Workspace</title>
    <style>
        /* Remove default browser spaces to achieve a 100% full-screen layout */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #ffffff;
        }

        /* Full-screen mask container: Removes gray borders and crops the footer */
        .wbs-tracker-fullscreen-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Adjust iframe height to push the pagination bar upward into the view */
        .wbs-tracker-fullscreen-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 42px); 
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="wbs-tracker-fullscreen-container">
        <iframe src="https://wbs-tracker-uat.streamlit.app/?embed=true"></iframe>
    </div>

</body>
</html>
