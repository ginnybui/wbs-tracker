<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS Management Workspace</title>
    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: #ffffff !important;
            overflow: hidden !important;
        }

        iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }

        /* A smart transparent shield overlay to perfectly cover Streamlit's footer watermark */
        .footer-mask-shield {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px; /* Precise height to block out the footer text */
            background-color: #ffffff; /* Matches the clean white application background */
            z-index: 99999; /* Forces the shield to always stay on top */
            pointer-events: none; /* CRITICAL: Mouse clicks pass through perfectly to reach pagination buttons */
        }
    </style>
</head>
<body>

    <iframe src="https://wbs-tracker-uat.streamlit.app/?embed=true"></iframe>
    
    <div class="footer-mask-shield"></div>

</body>
</html>
